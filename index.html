<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6750A4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackMaster">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  <link rel="apple-touch-icon" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  
  <!-- Resource hints for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="api.js" as="script">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Critical CSS for above-the-fold content */
    :root {
      --primary: #6750A4;
      --primary-light: #EADDFF;
      --on-primary: #FFFFFF;
      --surface: #FEF7FF;
      --surface-container: #F3EDF7;
      --on-surface: #1D1B20;
      --outline: #79747E;
      --error: #B3261E;
      --success: #0D904F;
      --warning: #FFC107;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 999px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      --header-height: 64px;
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      height: 100vh;
      overflow: hidden;
    }
    
    #app { width: 100%; height: 100%; }
    
    .app-shell { height: 100%; display: flex; flex-direction: column; }
    
    .app-bar {
      background: var(--primary);
      color: var(--on-primary);
      padding: var(--spacing-md) var(--spacing-lg);
      padding-top: calc(var(--spacing-md) + var(--safe-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }
    
    .app-title { font-size: 20px; font-weight: 600; }
    
    .main-content { flex: 1; overflow: hidden; position: relative; }
    
    .page-container {
      height: 100%;
      overflow-y: auto;
      padding: var(--spacing-lg);
      padding-bottom: calc(80px + var(--safe-bottom));
    }
    
    .bottom-nav {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      padding: var(--spacing-sm) var(--spacing-xs);
      padding-bottom: calc(var(--spacing-sm) + var(--safe-bottom));
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-xs);
      color: var(--outline);
      text-decoration: none;
      padding: var(--spacing-sm);
      border-radius: var(--radius-lg);
      flex: 1;
      max-width: 80px;
      cursor: pointer;
    }
    
    .nav-item.active {
      color: var(--primary);
      background: var(--primary-light);
    }
    
    .fab {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      right: var(--spacing-lg);
      width: 56px;
      height: 56px;
      border-radius: var(--radius-xl);
      background: var(--primary);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(103,80,164,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
    }
    
    .card {
      background: white;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--shadow);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-md);
    }
    
    .stat-card {
      background: var(--surface-container);
      border-radius: var(--radius-sm);
      padding: var(--spacing-lg);
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Report Types */
    .report-types {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .report-type-card {
      background: var(--surface-container);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    
    .report-type-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .report-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: white;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .report-type-card.selected .report-icon {
      background: var(--primary);
      color: white;
    }
    
    .report-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .report-desc {
      font-size: 13px;
      color: var(--outline);
    }
    
    .date-range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .format-options {
      display: flex;
      gap: 12px;
    }
    
    .format-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--outline);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
    }
    
    .format-option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .toast-container {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom) + var(--spacing-lg));
      left: 0;
      right: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    
    .toast {
      background: var(--on-surface);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <!-- App Bar -->
      <div class="app-bar">
        <div class="app-bar-content">
          <div class="app-title">TrackMaster</div>
        </div>
        <div class="app-actions">
          <button class="icon-button" onclick="refreshData()" title="Refresh">
            <span class="material-icons-round">refresh</span>
          </button>
          <button class="icon-button" onclick="showNotifications()" title="Notifications">
            <span class="material-icons-round">notifications</span>
          </button>
          <button class="icon-button" onclick="logout()" title="Logout">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </div>
      
      <!-- Offline Indicator -->
      <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="material-icons-round">cloud_off</span>
        You're offline
      </div>
      
      <!-- Main Content -->
      <div class="main-content">
        <div class="page-container">
          <div class="page" id="currentPage"></div>
        </div>
      </div>
      
      <!-- Floating Action Button -->
      <button class="fab" onclick="window.location.href='newactivity.html'" title="New Activity">
        <span class="material-icons-round">add</span>
      </button>
      
      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="handleNavClick('home'); return false;">
          <span class="material-icons-round nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('myactivity'); return false;">
          <span class="material-icons-round nav-icon">list_alt</span>
          <span class="nav-label">Activity</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('myteam'); return false;">
          <span class="material-icons-round nav-icon">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('reports'); return false;">
          <span class="material-icons-round nav-icon">download</span>
          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('more'); return false;">
          <span class="material-icons-round nav-icon">more_horiz</span>
          <span class="nav-label">More</span>
        </a>
      </div>
    </div>
    
    <!-- Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-header">
        <div class="install-icon">
          <span class="material-icons-round">install_mobile</span>
        </div>
        <div>
          <div class="install-title">Install TrackMaster</div>
          <div class="install-subtitle">Add to home screen</div>
        </div>
      </div>
      <div class="install-actions">
        <button class="btn btn-primary" style="flex: 1;" onclick="installApp()">Install</button>
        <button class="btn btn-secondary" style="flex: 1;" onclick="dismissInstall()">Not Now</button>
      </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script src="api.js"></script>
  <script>
    // ==================== OPTIMIZED APP STATE ====================
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'home',
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // ==================== ENHANCED CACHE SYSTEM ====================
    const pageCache = {
      data: new Map(),
      maxAge: 5 * 60 * 1000, // 5 minutes
      
      get(key) {
        const item = this.data.get(key);
        if (item && (Date.now() - item.timestamp) < this.maxAge) {
          return item.value;
        }
        this.data.delete(key);
        return null;
      },
      
      set(key, value) {
        this.data.set(key, {
          value,
          timestamp: Date.now()
        });
      },
      
      clear() {
        this.data.clear();
      }
    };
    
    // ==================== PRELOADING SYSTEM ====================
    const preloadQueue = ['myactivity', 'myteam', 'reports', 'more'];
    let preloadIndex = 0;
    
    function preloadNextPages() {
      if (preloadIndex < preloadQueue.length) {
        const nextPage = preloadQueue[preloadIndex];
        if (nextPage !== appState.currentPage) {
          setTimeout(() => {
            loadPageContent(nextPage, true).then(html => {
              if (html) pageCache.set(nextPage, html);
            }).catch(() => {});
          }, 1000);
        }
        preloadIndex++;
      }
    }
    
    // ==================== SKELETON LOADERS ====================
    function getOptimizedSkeleton(page) {
      const skeletons = {
        home: `
          <div class="card"><div class="skeleton" style="height: 24px; width: 60%;"></div></div>
          <div class="stats-grid">
            ${Array(4).fill().map(() => `
              <div class="stat-card"><div class="skeleton" style="height: 40px;"></div></div>
            `).join('')}
          </div>
        `,
        myactivity: `
          <div class="filter-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
            ${Array(3).fill().map(() => `<div class="skeleton" style="width: 80px; height: 36px; border-radius: 20px;"></div>`).join('')}
          </div>
          ${Array(2).fill().map(() => `
            <div class="card">
              <div class="skeleton" style="height: 24px; width: 40%;"></div>
              ${Array(3).fill().map(() => `
                <div class="skeleton" style="height: 80px; margin: 12px 0;"></div>
              `).join('')}
            </div>
          `).join('')}
        `,
        myteam: `
          <div class="card">
            <div class="skeleton" style="height: 24px; width: 40%;"></div>
            ${Array(4).fill().map(() => `
              <div class="skeleton" style="height: 120px; margin: 12px 0;"></div>
            `).join('')}
          </div>
        `,
        reports: `
          ${Array(2).fill().map(() => `
            <div class="skeleton" style="height: 80px; margin-bottom: 12px; border-radius: 16px;"></div>
          `).join('')}
          <div class="card">
            <div class="skeleton" style="height: 200px;"></div>
          </div>
        `,
        more: `
          <div class="card">
            <div style="display: flex; gap: 16px;">
              <div class="skeleton" style="width: 64px; height: 64px; border-radius: 50%;"></div>
              <div style="flex:1"><div class="skeleton" style="height: 60px;"></div></div>
            </div>
          </div>
          ${Array(4).fill().map(() => `<div class="skeleton" style="height: 70px; margin-bottom: 8px;"></div>`).join('')}
        `
      };
      return skeletons[page] || '<div class="card"><div class="skeleton" style="height: 200px;"></div></div>';
    }
    
    // ==================== NAVIGATION ====================
    let navigationTimeout;
    function handleNavClick(page) {
      if (navigationTimeout) clearTimeout(navigationTimeout);
      navigationTimeout = setTimeout(() => {
        navigateTo(page);
      }, 50); // Debounce rapid clicks
    }
    
    async function navigateTo(page, addToHistory = true) {
      event?.preventDefault();
      
      appState.currentPage = page;
      updateActiveNav(page);
      
      if (addToHistory) {
        history.pushState({ page }, '', '#' + page);
      }
      
      const container = document.getElementById('currentPage');
      
      // Check cache first - show instantly
      const cached = pageCache.get(page);
      if (cached) {
        container.innerHTML = cached;
        
        // Refresh in background
        setTimeout(() => {
          loadPageContent(page, true).then(html => {
            if (html) {
              pageCache.set(page, html);
              if (appState.currentPage === page) {
                container.innerHTML = html;
              }
            }
          });
        }, 500);
        
        return;
      }
      
      // Show skeleton immediately
      container.innerHTML = getOptimizedSkeleton(page);
      
      // Load fresh content
      await loadPageContent(page);
      
      // Start preloading next pages
      preloadNextPages();
    }
    
    function updateActiveNav(page) {
      const navMap = { home: 0, myactivity: 1, myteam: 2, reports: 3, more: 4 };
      document.querySelectorAll('.nav-item').forEach((item, index) => {
        if (index === navMap[page]) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }
    
    // ==================== PAGE LOADER ====================
    async function loadPageContent(page, isBackground = false) {
      if (!isBackground) {
        document.getElementById('loading').style.display = 'flex';
      }
      
      try {
        let html = '';
        
        switch(page) {
          case 'home':
            html = await loadDashboard();
            break;
          case 'myactivity':
            html = await loadMyActivity();
            break;
          case 'myteam':
            html = await loadMyTeam();
            break;
          case 'reports':
            html = loadReports();
            break;
          case 'more':
            html = loadMore();
            break;
        }
        
        pageCache.set(page, html);
        
        if (!isBackground) {
          document.getElementById('currentPage').innerHTML = html;
          if (page === 'reports') initReportsPage();
        }
        
        return html;
        
      } catch (error) {
        console.error('Error loading page:', error);
        if (!isBackground) {
          document.getElementById('currentPage').innerHTML = `
            <div class="card" style="text-align: center; padding: 40px;">
              <span class="material-icons-round" style="font-size: 48px; color: var(--error);">error</span>
              <h3>Failed to Load</h3>
              <p style="color: var(--outline); margin: 16px 0;">${error.message}</p>
              <button class="btn btn-primary" onclick="navigateTo('${page}')">Retry</button>
            </div>
          `;
        }
        return null;
      } finally {
        if (!isBackground) {
          document.getElementById('loading').style.display = 'none';
        }
      }
    }
    
    // ==================== DASHBOARD ====================
    async function loadDashboard() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      try {
        // Load stats first
        const statsResult = await API.getDashboardStats(appState.currentUser.staffId);
        
        let html = '';
        
        if (statsResult.success) {
          const stats = statsResult.stats || {};
          html = `
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">
                  <span class="material-icons-round">dashboard</span>
                  Welcome, ${escapeHtml(appState.currentUser.name)}
                </h3>
              </div>
              <div class="stats-grid">
                <div class="stat-card">
                  <div class="stat-value">${stats.weekly || 0}</div>
                  <div class="stat-label">This Week</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.monthly || 0}</div>
                  <div class="stat-label">This Month</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.total || 0}</div>
                  <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                  <div class="stat-value">${stats.pending || 0}</div>
                  <div class="stat-label">Pending</div>
                </div>
              </div>
            </div>
          `;
        }
        
        // Load activities in background
        setTimeout(async () => {
          try {
            const activitiesResult = await API.getUserActivities(appState.currentUser.staffId, 'all');
            if (activitiesResult.success && activitiesResult.activities?.length > 0) {
              const recentHtml = `
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Recent Activities</h3>
                  </div>
                  <div class="activity-list">
                    ${activitiesResult.activities.slice(0, 3).map(a => `
                      <div class="activity-item" onclick="editActivity('${a.rowId}')">
                        <div class="activity-header">
                          <span class="activity-date">${a.date || ''}</span>
                        </div>
                        <div class="activity-description">${escapeHtml(a.description || '')}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `;
              
              const container = document.getElementById('currentPage');
              if (container && appState.currentPage === 'home') {
                container.innerHTML = html + recentHtml;
                pageCache.set('home', container.innerHTML);
              }
            }
          } catch (e) {}
        }, 500);
        
        return html;
        
      } catch (error) {
        return '<div class="card">Error loading dashboard</div>';
      }
    }
    
    // ==================== MY ACTIVITY ====================
    async function loadMyActivity() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        
        if (result.success && result.activities?.length > 0) {
          // Group by month
          const grouped = {};
          result.activities.forEach(activity => {
            if (!activity.date) return;
            const date = new Date(activity.date);
            const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
            if (!grouped[monthYear]) grouped[monthYear] = [];
            grouped[monthYear].push(activity);
          });
          
          let html = `
            <div class="filter-bar" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto;">
              <button class="filter-chip active" onclick="filterActivities('all')">All</button>
              <button class="filter-chip" onclick="filterActivities('weekly')">This Week</button>
              <button class="filter-chip" onclick="filterActivities('monthly')">This Month</button>
            </div>
          `;
          
          Object.entries(grouped).forEach(([month, activities]) => {
            html += `
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">${month}</h3>
                  <span class="badge" style="background: var(--primary-light); color: var(--primary); padding: 4px 8px; border-radius: 12px;">${activities.length} activities</span>
                </div>
                <div class="activity-list">
                  ${activities.map(a => `
                    <div class="activity-item ${a.status === 'Pending Approval' ? 'pending' : ''}" onclick="editActivity('${a.rowId}')" style="cursor: pointer; border-left: 4px solid ${a.status === 'Approved' ? 'var(--success)' : 'var(--warning)'};">
                      <div class="activity-header" style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span class="activity-date" style="font-weight: 600;">${a.date || 'No date'}</span>
                        <span class="activity-day" style="color: ${a.status === 'Approved' ? 'var(--success)' : 'var(--warning)'}">${a.status || 'Unknown'}</span>
                      </div>
                      <div class="activity-description" style="margin-bottom: 8px;">${escapeHtml(a.description || 'No description')}</div>
                      <div class="activity-meta" style="display: flex; gap: 16px; font-size: 12px; color: var(--outline);">
                        ${a.location ? `<span><span class="material-icons-round" style="font-size: 14px;">location_on</span> ${a.location}</span>` : ''}
                        <span><span class="material-icons-round" style="font-size: 14px;">groups</span> ${a.teamMembers?.length || 1} members</span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          });
          
          return html;
        }
        
        return `
          <div class="card" style="text-align: center; padding: 40px 20px;">
            <span class="material-icons-round" style="font-size: 48px; color: var(--outline);">assignment</span>
            <h3>No Activities Found</h3>

    async function filterActivities(filter) {

      document.getElementById('loading').style.display = 'flex';
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, filter);
        
        if (result.success) {
          pageCache.delete('myactivity');
          await loadPageContent('myactivity');

      } catch (error) {
        showToast('Error filtering activities', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }

    // ==================== REPORT FUNCTIONS ====================
    function selectReportType(type) {
      appState.reportType = type;
      document.querySelectorAll('.report-type-card').forEach(c => c.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - (type === 'weekly' ? 7 : 30));
      
      document.getElementById('startDate').valueAsDate = startDate;
      document.getElementById('endDate').valueAsDate = today;
    }
    
    function selectFormat(format) {
      appState.format = format;
      document.querySelectorAll('.format-option').forEach(o => o.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }
    
    function initReportsPage() {
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - 7);
      
      const startInput = document.getElementById('startDate');
      const endInput = document.getElementById('endDate');
      
      if (startInput && endInput) {
        startInput.valueAsDate = startDate;
        endInput.valueAsDate = today;
      }

    async function previewReport() {
      const startDate = document.getElementById('startDate')?.value;
      const endDate = document.getElementById('endDate')?.value;
      
      if (!startDate || !endDate) {
        showToast('Select dates', 'error');
        return;
      }
      
      showLoading('Loading preview...');
      
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        
        if (result.success) {
          const start = new Date(startDate);
          const end = new Date(endDate);
          
          const filtered = (result.activities || []).filter(a => {
            const ad = new Date(a.date);
            return ad >= start && ad <= end;
          });
          
          const previewContent = document.getElementById('previewContent');
          
          if (filtered.length === 0) {
            previewContent.innerHTML = '<div style="text-align: center; padding: 20px;">No activities found</div>';
          } else {
            previewContent.innerHTML = `
              <table style="width: 100%; border-collapse: collapse;">
                <thead>
                  <tr style="background: var(--primary-light);">
                    <th style="padding: 8px; text-align: left;">Date</th>
                    <th style="padding: 8px; text-align: left;">Description</th>
                    <th style="padding: 8px; text-align: left;">Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.slice(0, 10).map(a => `
                    <tr style="border-bottom: 1px solid var(--outline);">
                      <td style="padding: 8px;">${a.date}</td>
                      <td style="padding: 8px;">${escapeHtml(a.description).substring(0, 30)}${a.description?.length > 30 ? '...' : ''}</td>
                      <td style="padding: 8px;">${a.status}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
              ${filtered.length > 10 ? `<div style="margin-top: 8px; color: var(--outline);">... and ${filtered.length - 10} more</div>` : ''}
            `;
          }
          
          document.getElementById('reportPreview').style.display = 'block';
        }
      } catch (error) {
        showToast('Preview failed', 'error');
      } finally {
        hideLoading();
      }

    async function generateReport() {

      const endDate = document.getElementById('endDate')?.value;
      
      if (!startDate || !endDate) {
        showToast('Select dates', 'error');
        return;
      }
      
      showLoading('Generating...');
      
      try {
        const result = await API.generateReport(
          appState.currentUser.staffId,
          appState.reportType,
          appState.format,
          startDate,
          endDate
        );
        
        if (result.success) {
          const report = {
            id: Date.now(),
            name: `${appState.reportType === 'weekly' ? 'Weekly' : 'Monthly'} Report`,
            type: appState.reportType,
            format: appState.format,
            date: new Date().toLocaleDateString()
          };
          
          appState.recentReports.unshift(report);
          if (appState.recentReports.length > 10) appState.recentReports.pop();
          localStorage.setItem('recentReports', JSON.stringify(appState.recentReports));
          
          document.getElementById('recentReportsList').innerHTML = renderRecentReports();
          showToast('Report generated', 'success');
        }
      } catch (error) {
        showToast('Generation failed', 'error');
      } finally {

      }

    // ==================== HELPER FUNCTIONS ====================
    function getInitials(name) {
      if (!name) return 'U';
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }
    
    function getAvatarColor(id) {
      const colors = ['#6750A4', '#0D904F', '#DC3545', '#FFC107', '#17A2B8'];
      const index = (id || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;
      return colors[index];
    }
    
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    function editActivity(rowId) {
      sessionStorage.setItem('editActivityId', rowId);
      window.location.href = 'newactivity.html?edit=' + rowId;
    }

      showToast('No new notifications', 'info');

    function checkInstallPrompt() {
      if (appState.deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('installPrompt').style.display = 'block';
      }
    }
    
    function installApp() {
      if (appState.deferredPrompt) {
        appState.deferredPrompt.prompt();
        appState.deferredPrompt = null;
        document.getElementById('installPrompt').style.display = 'none';
      }
    }
    
    function dismissInstall() {
      document.getElementById('installPrompt').style.display = 'none';
      localStorage.setItem('installPromptDismissed', Date.now());
    }

    async function syncOfflineActivities() {
      if (appState.offlineActivities.length > 0) {
        for (const activity of appState.offlineActivities) {
          try { await API.saveActivity(activity); } catch (e) {}
        }
        appState.offlineActivities = [];
        localStorage.removeItem('offlineActivities');
        showToast('Sync completed', 'success');
      }

        localStorage.removeItem('trackmaster_user');

    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

        showToast('Cache cleared', 'success');
        loadPageContent('more');

    }
    
    // ==================== INITIALIZE ====================
    function checkAuth() {
      const savedUser = localStorage.getItem('trackmaster_user');
      const sessionUser = sessionStorage.getItem('trackmaster_session');
      
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          if (Date.now() < (userData.expiry || 0)) {
            appState.currentUser = userData;
            return true;
          }
        } catch (e) {}
      } else if (sessionUser) {
        try {
          appState.currentUser = JSON.parse(sessionUser);
          return true;
        } catch (e) {}
      }
      
      window.location.href = 'login.html';
      return false;
    }
    
    function setupEventListeners() {
      window.addEventListener('online', () => {
        appState.isOnline = true;
        document.getElementById('offlineIndicator').style.display = 'none';
        showToast('You are back online!', 'success');
        syncOfflineActivities();
      });
      
      window.addEventListener('offline', () => {
        appState.isOnline = false;
        document.getElementById('offlineIndicator').style.display = 'flex';
        showToast('You are offline', 'warning');
      });
      
      window.addEventListener('popstate', (e) => {
        const page = e.state?.page || 'home';
        navigateTo(page, false);
      });
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        appState.deferredPrompt = e;
      });
    }
    
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.log('ServiceWorker registration failed:', err);
        });
      }
    }
    
    async function initApp() {
      if (!checkAuth()) return;
      
      setupEventListeners();
      registerServiceWorker();
      
      const hash = window.location.hash.substring(1);
      const initialPage = hash || 'home';
      
      updateActiveNav(initialPage);
      await navigateTo(initialPage, false);
      
      setTimeout(checkInstallPrompt, 3000);
    }
    
    window.onload = initApp;
  </script>
</body>
</html>
