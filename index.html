<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6750A4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackMaster">
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  <link rel="apple-touch-icon" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_192dp.png">
  
  <!-- Resource hints for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="api.js" as="script">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Critical CSS */
    :root {
      --primary: #6750A4;
      --primary-light: #EADDFF;
      --on-primary: #FFFFFF;
      --surface: #FEF7FF;
      --surface-container: #F3EDF7;
      --on-surface: #1D1B20;
      --outline: #79747E;
      --error: #B3261E;
      --success: #0D904F;
      --warning: #FFC107;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 999px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      --header-height: 64px;
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      height: 100vh;
      overflow: hidden;
    }
    #app { width: 100%; height: 100%; }
    .app-shell { height: 100%; display: flex; flex-direction: column; }
    .app-bar {
      background: var(--primary);
      color: var(--on-primary);
      padding: var(--spacing-md) var(--spacing-lg);
      padding-top: calc(var(--spacing-md) + var(--safe-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }
    .app-title { font-size: 20px; font-weight: 600; }
    .main-content { flex: 1; overflow: hidden; position: relative; }
    .page-container {
      height: 100%;
      overflow-y: auto;
      padding: var(--spacing-lg);
      padding-bottom: calc(80px + var(--safe-bottom));
    }
    .bottom-nav {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      padding: var(--spacing-sm) var(--spacing-xs);
      padding-bottom: calc(var(--spacing-sm) + var(--safe-bottom));
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-xs);
      color: var(--outline);
      text-decoration: none;
      padding: var(--spacing-sm);
      border-radius: var(--radius-lg);
      flex: 1;
      max-width: 80px;
      cursor: pointer;
    }
    .nav-item.active {
      color: var(--primary);
      background: var(--primary-light);
    }
    .fab {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      right: var(--spacing-lg);
      width: 56px;
      height: 56px;
      border-radius: var(--radius-xl);
      background: var(--primary);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(103,80,164,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
    }
    .card {
      background: white;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--shadow);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-md);
    }
    .stat-card {
      background: var(--surface-container);
      border-radius: var(--radius-sm);
      padding: var(--spacing-lg);
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .report-types {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .report-type-card {
      background: var(--surface-container);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .report-type-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .report-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: white;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .report-type-card.selected .report-icon {
      background: var(--primary);
      color: white;
    }
    .report-title { font-size: 16px; font-weight: 600; }
    .report-desc { font-size: 13px; color: var(--outline); }
    .date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .format-options { display: flex; gap: 12px; }
    .format-option {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--outline);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
    }
    .format-option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .toast-container {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom) + var(--spacing-lg));
      left: 0;
      right: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: var(--on-surface);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <div class="app-bar">
        <div class="app-bar-content">
          <div class="app-title">TrackMaster</div>
        </div>
        <div class="app-actions">
          <button class="icon-button" onclick="refreshData()" title="Refresh">
            <span class="material-icons-round">refresh</span>
          </button>
          <button class="icon-button" onclick="showNotifications()" title="Notifications">
            <span class="material-icons-round">notifications</span>
          </button>
          <button class="icon-button" onclick="logout()" title="Logout">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </div>
      
      <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="material-icons-round">cloud_off</span> You're offline
      </div>
      
      <div class="main-content">
        <div class="page-container">
          <div class="page" id="currentPage"></div>
        </div>
      </div>
      
      <button class="fab" onclick="window.location.href='newactivity.html'" title="New Activity">
        <span class="material-icons-round">add</span>
      </button>
      
      <div class="bottom-nav">
        <a href="#" class="nav-item" onclick="handleNavClick('home'); return false;">
          <span class="material-icons-round nav-icon">home</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('myactivity'); return false;">
          <span class="material-icons-round nav-icon">list_alt</span>
          <span class="nav-label">Activity</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('myteam'); return false;">
          <span class="material-icons-round nav-icon">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('reports'); return false;">
          <span class="material-icons-round nav-icon">download</span>
          <span class="nav-label">Reports</span>
        </a>
        <a href="#" class="nav-item" onclick="handleNavClick('more'); return false;">
          <span class="material-icons-round nav-icon">more_horiz</span>
          <span class="nav-label">More</span>
        </a>
      </div>
    </div>
    
    <div id="installPrompt" class="install-prompt" style="display: none;">
      <div class="install-header">
        <div class="install-icon"><span class="material-icons-round">install_mobile</span></div>
        <div>
          <div class="install-title">Install TrackMaster</div>
          <div class="install-subtitle">Add to home screen</div>
        </div>
      </div>
      <div class="install-actions">
        <button class="btn btn-primary" style="flex:1" onclick="installApp()">Install</button>
        <button class="btn btn-secondary" style="flex:1" onclick="dismissInstall()">Not Now</button>
      </div>
    </div>
    
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loadingText">Loading...</div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
  </div>
  
  <script src="api.js"></script>
  <script>
    // App State
    const appState = {
      currentUser: null,
      isOnline: navigator.onLine,
      deferredPrompt: null,
      currentPage: 'home',
      offlineActivities: JSON.parse(localStorage.getItem('offlineActivities') || '[]'),
      recentReports: JSON.parse(localStorage.getItem('recentReports') || '[]'),
      reportType: 'weekly',
      format: 'pdf',
      previewData: null
    };
    
    // Enhanced Cache System
    const pageCache = {
      data: new Map(),
      maxAge: 5 * 60 * 1000,
      get(key) {
        const item = this.data.get(key);
        if (item && (Date.now() - item.timestamp) < this.maxAge) return item.value;
        this.data.delete(key);
        return null;
      },
      set(key, value) { this.data.set(key, { value, timestamp: Date.now() }); },
      clear() { this.data.clear(); }
    };
    
    // Preloading System
    const preloadQueue = ['myactivity', 'myteam', 'reports', 'more'];
    let preloadIndex = 0;
    function preloadNextPages() {
      if (preloadIndex < preloadQueue.length) {
        const nextPage = preloadQueue[preloadIndex];
        if (nextPage !== appState.currentPage) {
          setTimeout(() => {
            loadPageContent(nextPage, true).then(html => {
              if (html) pageCache.set(nextPage, html);
            }).catch(() => {});
          }, 1000);
        }
        preloadIndex++;
      }
    }
    
    // Skeleton Loaders
    function getOptimizedSkeleton(page) {
      const skeletons = {
        home: `<div class="card"><div class="skeleton" style="height:24px; width:60%"></div></div><div class="stats-grid">${Array(4).fill().map(()=>`<div class="stat-card"><div class="skeleton" style="height:40px"></div></div>`).join('')}</div>`,
        myactivity: `<div class="filter-bar" style="display:flex; gap:10px; margin-bottom:20px;">${Array(3).fill().map(()=>`<div class="skeleton" style="width:80px; height:36px; border-radius:20px;"></div>`).join('')}</div>${Array(2).fill().map(()=>`<div class="card"><div class="skeleton" style="height:24px; width:40%"></div>${Array(3).fill().map(()=>`<div class="skeleton" style="height:80px; margin:12px 0;"></div>`).join('')}</div>`).join('')}`,
        myteam: `<div class="card"><div class="skeleton" style="height:24px; width:40%"></div>${Array(4).fill().map(()=>`<div class="skeleton" style="height:120px; margin:12px 0;"></div>`).join('')}</div>`,
        reports: `${Array(2).fill().map(()=>`<div class="skeleton" style="height:80px; margin-bottom:12px; border-radius:16px;"></div>`).join('')}<div class="card"><div class="skeleton" style="height:200px"></div></div>`,
        more: `<div class="card"><div style="display:flex; gap:16px"><div class="skeleton" style="width:64px; height:64px; border-radius:50%"></div><div style="flex:1"><div class="skeleton" style="height:60px"></div></div></div></div>${Array(4).fill().map(()=>`<div class="skeleton" style="height:70px; margin-bottom:8px;"></div>`).join('')}`
      };
      return skeletons[page] || '<div class="card"><div class="skeleton" style="height:200px"></div></div>';
    }
    
    // Navigation
    let navigationTimeout;
    function handleNavClick(page) {
      if (navigationTimeout) clearTimeout(navigationTimeout);
      navigationTimeout = setTimeout(() => navigateTo(page), 50);
    }
    
    async function navigateTo(page, addToHistory = true) {
      event?.preventDefault();
      appState.currentPage = page;
      updateActiveNav(page);
      if (addToHistory) history.pushState({ page }, '', '#' + page);
      
      const container = document.getElementById('currentPage');
      const cached = pageCache.get(page);
      
      if (cached) {
        container.innerHTML = cached;
        setTimeout(() => {
          loadPageContent(page, true).then(html => {
            if (html) {
              pageCache.set(page, html);
              if (appState.currentPage === page) container.innerHTML = html;
            }
          });
        }, 500);
        return;
      }
      
      container.innerHTML = getOptimizedSkeleton(page);
      await loadPageContent(page);
      preloadNextPages();
    }
    
    function updateActiveNav(page) {
      const navMap = { home: 0, myactivity: 1, myteam: 2, reports: 3, more: 4 };
      document.querySelectorAll('.nav-item').forEach((item, i) => {
        item.classList.toggle('active', i === navMap[page]);
      });
    }
    
    // Page Loader
    async function loadPageContent(page, isBackground = false) {
      if (!isBackground) document.getElementById('loading').style.display = 'flex';
      try {
        let html = '';
        switch(page) {
          case 'home': html = await loadDashboard(); break;
          case 'myactivity': html = await loadMyActivity(); break;
          case 'myteam': html = await loadMyTeam(); break;
          case 'reports': html = loadReports(); break;
          case 'more': html = loadMore(); break;
        }
        pageCache.set(page, html);
        if (!isBackground) {
          document.getElementById('currentPage').innerHTML = html;
          if (page === 'reports') initReportsPage();
        }
        return html;
      } catch (error) {
        console.error('Error loading page:', error);
        if (!isBackground) {
          document.getElementById('currentPage').innerHTML = `
            <div class="card" style="text-align:center; padding:40px">
              <span class="material-icons-round" style="font-size:48px; color:var(--error)">error</span>
              <h3>Failed to Load</h3>
              <p style="color:var(--outline); margin:16px 0">${error.message}</p>
              <button class="btn btn-primary" onclick="navigateTo('${page}')">Retry</button>
            </div>`;
        }
        return null;
      } finally {
        if (!isBackground) document.getElementById('loading').style.display = 'none';
      }
    }
    
    // Dashboard
    async function loadDashboard() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      try {
        const statsResult = await API.getDashboardStats(appState.currentUser.staffId);
        let html = '';
        if (statsResult.success) {
          const stats = statsResult.stats || {};
          html = `<div class="card"><div class="card-header"><h3 class="card-title"><span class="material-icons-round">dashboard</span> Welcome, ${escapeHtml(appState.currentUser.name)}</h3></div><div class="stats-grid">${['weekly','monthly','total','pending'].map(k => `<div class="stat-card"><div class="stat-value">${stats[k]||0}</div><div class="stat-label">${k==='weekly'?'This Week':k==='monthly'?'This Month':k==='total'?'Total':'Pending'}</div></div>`).join('')}</div></div>`;
        }
        setTimeout(async () => {
          try {
            const activitiesResult = await API.getUserActivities(appState.currentUser.staffId, 'all');
            if (activitiesResult.success && activitiesResult.activities?.length > 0) {
              const recentHtml = `<div class="card"><div class="card-header"><h3 class="card-title">Recent Activities</h3></div><div class="activity-list">${activitiesResult.activities.slice(0,3).map(a => `<div class="activity-item" onclick="editActivity('${a.rowId}')"><div class="activity-header"><span class="activity-date">${a.date||''}</span></div><div class="activity-description">${escapeHtml(a.description||'')}</div></div>`).join('')}</div></div>`;
              const container = document.getElementById('currentPage');
              if (container && appState.currentPage === 'home') {
                container.innerHTML = html + recentHtml;
                pageCache.set('home', container.innerHTML);
              }
            }
          } catch (e) {}
        }, 500);
        return html;
      } catch (error) {
        return '<div class="card">Error loading dashboard</div>';
      }
    }
    
    // My Activity
    async function loadMyActivity() {
      if (!appState.currentUser) return '<div class="card">Please login</div>';
      try {
        const result = await API.getUserActivities(appState.currentUser.staffId, 'all');
        if (result.success && result.activities?.length > 0) {
          const grouped = {};
          result.activities.forEach(activity => {
            if (!activity.date) return;
            const date = new Date(activity.date);
            const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
            if (!grouped[monthYear]) grouped[monthYear] = [];
            grouped[monthYear].push(activity);
          });
          
          let html = `<div class="filter-bar" style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;"><button class="filter-chip active" onclick="filterActivities('all')">All</button><button class="filter-chip" onclick="filterActivities('weekly')">This Week</button><button class="filter-chip" onclick="filterActivities('monthly')">This Month</button></div>`;
          
          Object.entries(grouped).forEach(([month, activities]) => {
            html += `<div class="card"><div class="card-header"><h3 class="card-title">${month}</h3><span class="badge" style="background:var(--primary-light); color:var(--primary); padding:4px 8px; border-radius:12px;">${activities.length} activities</span></div><div class="activity-list">${activities.map(a => `<div class="activity-item ${a.status === 'Pending Approval' ? 'pending' : ''}" onclick="editActivity('${a.rowId}')" style="cursor:pointer; border-left:4px solid ${a.status === 'Approved' ? 'var(--success)' : 'var(--warning)'};"><div class="activity-header" style="display:flex; justify-content:space-between; margin-bottom:8px;"><span class="activity-date" style="font-weight:600;">${a.date||'No date'}</span><span class="activity-day" style="color:${a.status === 'Approved' ? 'var(--success)' : 'var(--warning)'}">${a.status||'Unknown'}</span></div><div class="activity-description" style="margin-bottom:8px;">${escapeHtml(a.description||'No description')}</div><div class="activity-meta" style="display:flex; gap:16px; font-size:12px; color:var(--outline);">${a.location ? `<span><span class="material-icons-round" style="font-size:14px;">location_on</span> ${a.location}</span>` : ''}<span><span class="material-icons-round" style="font-size:14px;">groups</span> ${a.teamMembers?.length || 1} members</span></div></div>`).join('')}</div></div>`;
          });
          return html;
        }
        return `<div class="card" style="text-align:center; padding:40px 20px;"><span class="material-icons-round" style="font-size:48px; color:var(--outline);">assignment</span><h3>No Activities Found</h3><p style="color:var(--outline); margin:20px 0;">Start by adding your first activity</p><button class="btn btn-primary" onclick="window.location.href='newactivity.html'"><span class="material-icons-round">add</span> Add New Activity</button></div>`;
      } catch (error) {
        return '<div class="card">Error loading activities</div>';
      }
    }
    
    // My Team
    async function loadMyTeam() {
      try {
        const result = await API.getTeamMembers();
        if (result.success && result.members?.length > 0) {
          return `<div class="card"><div class="card-header"><h3 class="card-title"><span class="material-icons-round">groups</span> Team Members (${result.members.length})</h3></div><div class="team-grid" style="display:grid; gap:16px;">${result.members.map(m => `<div class="team-member" style="background:var(--surface-container); border-radius:12px; padding:16px;"><div style="display:flex; align-items:center; gap:16px; margin-bottom:12px;"><div class="member-avatar" style="width:48px; height:48px; border-radius:50%; background:${getAvatarColor(m.staffId||'')}; color:white; display:flex; align-items:center; justify-content:center; font-weight:600;">${getInitials(m.name)}</div><div><h4 style="margin-bottom:4px;">${escapeHtml(m.name||'Unknown')}</h4><div style="color:var(--outline); font-size:13px;">${escapeHtml(m.designation||'Team Member')}</div></div></div><div style="font-size:13px;"><div style="margin-bottom:4px;"><strong>ID:</strong> ${escapeHtml(m.staffId||'N/A')}</div><div style="margin-bottom:4px;"><strong>Contact:</strong> ${escapeHtml(m.contactNo||'N/A')}</div><div style="margin-bottom:4px;"><strong>Email:</strong> ${escapeHtml(m.email||'N/A')}</div><div><strong>Role:</strong> ${escapeHtml(m.role||'User')}</div></div></div>`).join('')}</div></div>`;
        }
        return '<div class="card">No team members found</div>';
      } catch (error) {
        return '<div class="card">Error loading team</div>';
      }
    }
    
    // Reports
    function loadReports() {
      return `
        <div class="report-types">
          <div class="report-type-card ${appState.reportType === 'weekly' ? 'selected' : ''}" onclick="selectReportType('weekly')">
            <div class="report-icon"><span class="material-icons-round">calendar_month</span></div>
            <div class="report-text"><div class="report-title">Weekly Timesheet</div><div class="report-desc">Last 7 days summary</div></div>
          </div>
          <div class="report-type-card ${appState.reportType === 'monthly' ? 'selected' : ''}" onclick="selectReportType('monthly')">
            <div class="report-icon"><span class="material-icons-round">calendar_today</span></div>
            <div class="report-text"><div class="report-title">Monthly Report</div><div class="report-desc">Complete month summary</div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title"><span class="material-icons-round">settings</span> Report Configuration</h3></div>
          <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label required">Date Range</label>
            <div class="date-range">
              <div><label style="font-size:12px; color:var(--outline);">Start Date</label><input type="date" class="form-input" id="startDate" style="width:100%; padding:10px; border:1px solid var(--outline); border-radius:8px;" required></div>
              <div><label style="font-size:12px; color:var(--outline);">End Date</label><input type="date" class="form-input" id="endDate" style="width:100%; padding:10px; border:1px solid var(--outline); border-radius:8px;" required></div>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label required">Format</label>
            <div class="format-options">
              <div class="format-option ${appState.format === 'pdf' ? 'selected' : ''}" onclick="selectFormat('pdf')"><div class="format-icon"><i class="fas fa-file-pdf"></i></div><div class="format-name">PDF</div></div>
              <div class="format-option ${appState.format === 'excel' ? 'selected' : ''}" onclick="selectFormat('excel')"><div class="format-icon"><i class="fas fa-file-excel"></i></div><div class="format-name">Excel</div></div>
              <div class="format-option ${appState.format === 'csv' ? 'selected' : ''}" onclick="selectFormat('csv')"><div class="format-icon"><i class="fas fa-file-csv"></i></div><div class="format-name">CSV</div></div>
            </div>
          </div>
          <div style="display:flex; gap:16px; margin-top:24px;">
            <button class="btn btn-secondary" style="flex:1; padding:12px;" onclick="previewReport()"><span class="material-icons-round">visibility</span> Preview</button>
            <button class="btn btn-primary" style="flex:1; padding:12px;" onclick="generateReport()"><span class="material-icons-round">download</span> Download</button>
          </div>
        </div>
        <div class="report-preview" id="reportPreview" style="display:none; background:var(--surface-container); border-radius:12px; padding:20px; margin-bottom:24px;">
          <div class="preview-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3>Report Preview</h3>
            <button class="action-btn" onclick="closePreview()" style="width:32px; height:32px; border-radius:50%; border:none; background:var(--surface); cursor:pointer;"><i class="fas fa-times"></i></button>
          </div>
          <div class="preview-content" id="previewContent" style="max-height:300px; overflow-y:auto; background:var(--surface); padding:12px; border-radius:8px;"></div>
        </div>
        <div class="recent-reports" style="background:var(--surface-container); border-radius:12px; padding:20px;">
          <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 class="card-title"><span class="material-icons-round">history</span> Recent Reports</h3>
          </div>
          <div class="reports-list" id="recentReportsList" style="display:flex; flex-direction:column; gap:12px;">${renderRecentReports()}</div>
        </div>
      `;
    }
    
    function renderRecentReports() {
      if (!appState.recentReports?.length) return '<div style="text-align:center; padding:20px; color:var(--outline);">No recent reports</div>';
      return appState.recentReports.slice(0,5).map((r,i) => {
        const icon = r.format === 'pdf' ? 'file-pdf' : r.format === 'excel' ? 'file-excel' : 'file-csv';
        return `<div class="report-item" style="display:flex; align-items:center; gap:12px; padding:12px; background:var(--surface); border-radius:8px;"><div class="report-item-icon" style="width:40px; height:40px; border-radius:8px; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center;"><i class="fas fa-${icon}"></i></div><div class="report-item-info" style="flex:1;"><div class="report-item-name" style="font-weight:600;">${r.name||'Report'}</div><div class="report-item-details" style="display:flex; gap:12px; font-size:12px; color:var(--outline);"><span>${r.type||'Report'}</span><span>${r.date||''}</span></div></div><div class="report-item-actions" style="display:flex; gap:4px;"><button class="action-btn" onclick="downloadRecentReport(${i})" style="width:32px; height:32px; border-radius:50%; border:none; background:var(--surface); cursor:pointer;"><i class="fas fa-download"></i></button><button class="action-btn" onclick="deleteRecentReport(${i})" style="width:32px; height:32px; border-radius:50%; border:none; background:var(--surface); cursor:pointer;"><i class="fas fa-trash"></i></button></div></div>`;
      }).join('');
    }
