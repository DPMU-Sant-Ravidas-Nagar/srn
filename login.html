<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6750A4">
  
  <!-- Preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .login-container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      background: var(--surface);
    }
    
    .login-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-3xl);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .app-logo {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      background: var(--primary);
      color: var(--on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-xl);
      font-size: 32px;
    }
    
    .app-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: var(--spacing-sm);
    }
    
    .app-subtitle {
      color: var(--outline);
      margin-bottom: var(--spacing-2xl);
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: var(--spacing-xl);
      text-align: left;
    }
    
    .form-label {
      display: block;
      margin-bottom: var(--spacing-sm);
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-input {
      width: 100%;
      padding: var(--spacing-lg);
      border: 1px solid var(--outline);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: inherit;
      background: white;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.1);
    }
    
    .password-container {
      position: relative;
    }
    
    .toggle-password {
      position: absolute;
      right: var(--spacing-lg);
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--outline);
      cursor: pointer;
      padding: var(--spacing-xs);
    }
    
    .login-button {
      width: 100%;
      padding: var(--spacing-lg);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: var(--spacing-lg) 0;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .login-button:hover {
      background: #5A4790;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(103, 80, 164, 0.3);
    }
    
    .login-button:active {
      transform: translateY(0);
    }
    
    .login-button.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    
    .login-button.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: button-spin 0.8s linear infinite;
    }
    
    @keyframes button-spin {
      to { transform: rotate(360deg); }
    }
    
    .error-message {
      color: var(--error);
      margin: var(--spacing-md) 0;
      font-size: 14px;
      display: none;
      padding: var(--spacing-sm);
      background: rgba(179, 38, 30, 0.1);
      border-radius: var(--radius-sm);
    }
    
    .forgot-password {
      text-align: center;
    }
    
    .forgot-password a {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }
    
    .forgot-password a:hover {
      color: #5A4790;
      text-decoration: underline;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    .shake {
      animation: shake 0.5s;
    }
    
    @media (prefers-color-scheme: dark) {
      .login-card {
        background: #2D2B30;
      }
      
      .form-input {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--on-surface);
      }
    }
  </style>
  <script src="api.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="app-logo">
        <span class="material-icons-round">track_changes</span>
      </div>
      
      <h1 class="app-title">TrackMaster</h1>
      <p class="app-subtitle">Timesheet Management System</p>
      
      <form id="loginForm" onsubmit="return false;" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Staff ID</label>
          <input type="text" class="form-input" id="username" placeholder="Enter your Staff ID" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-container">
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword()" tabindex="-1">
              <span class="material-icons-round" id="toggleIcon">visibility_off</span>
            </button>
          </div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <button class="login-button" id="loginButton" onclick="login()">
          <span class="button-text">Login</span>
        </button>
        
        <div class="forgot-password">
          <a href="#" onclick="forgotPassword()">Forgot password?</a>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div>Logging in...</div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <script>
    // Check for saved credentials
    function checkSavedCredentials() {
      const savedUser = localStorage.getItem('trackmaster_user');
      if (savedUser) {
        try {
          const userData = JSON.parse(savedUser);
          if (Date.now() < (userData.expiry || 0)) {
            window.location.href = 'index.html';
            return true;
          }
        } catch (e) {}
      }
      return false;
    }
    
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = 'visibility';
      } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = 'visibility_off';
      }
    }
    
    // Login function
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginButton = document.getElementById('loginButton');
      const errorElement = document.getElementById('errorMessage');
      
      if (!username || !password) {
        showError('Please enter both Staff ID and password');
        return;
      }
      
      // Show loading state
      loginButton.classList.add('loading');
      loginButton.disabled = true;
      errorElement.style.display = 'none';
      
      try {
        const result = await API.login(username, password);
        
        if (result.success) {
          // Save user data
          const userData = {
            ...result.user,
            expiry: Date.now() + (7 * 24 * 60 * 60 * 1000) // 7 days
          };
          
          localStorage.setItem('trackmaster_user', JSON.stringify(userData));
          
          showToast('Login successful! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          loginButton.classList.remove('loading');
          loginButton.disabled = false;
          showError(result.message || 'Invalid credentials');
        }
      } catch (error) {
        loginButton.classList.remove('loading');
        loginButton.disabled = false;
        showError('Connection error. Please try again.');
      }
    }
    
    // Show error message
    function showError(message) {
      const errorElement = document.getElementById('errorMessage');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
      errorElement.classList.add('shake');
      
      setTimeout(() => {
        errorElement.classList.remove('shake');
      }, 500);
    }
    
    // Show toast
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      
      document.getElementById('toastContainer').appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }
    
    // Forgot password
    function forgotPassword() {
      showToast('Please contact your administrator', 'info');
    }
    
    // Enter key to submit
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
    
    // Check saved credentials on load
    window.onload = function() {
      if (!checkSavedCredentials()) {
        document.getElementById('username').focus();
      }
    };
  </script>
</body>
</html>
